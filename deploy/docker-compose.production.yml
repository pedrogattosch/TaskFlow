services:
  api:
    build:
      context: ..
      dockerfile: src/TaskFlow.API/Dockerfile
    container_name: taskflow-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: ${CONNECTIONSTRINGS__DEFAULTCONNECTION}
      Jwt__Issuer: ${JWT__ISSUER}
      Jwt__Audience: ${JWT__AUDIENCE}
      Jwt__SecretKey: ${JWT__SECRETKEY}
      Jwt__ExpirationMinutes: ${JWT__EXPIRATIONMINUTES:-60}
      Cors__AllowedOrigins__0: ${CORS__ALLOWEDORIGIN:-}
    restart: unless-stopped
    expose:
      - "8080"

  web:
    build:
      context: ..
      dockerfile: web/taskflow-web/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: taskflow-web
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-80}:80"
    restart: unless-stopped
